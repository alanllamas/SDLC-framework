# Template: TQUERY_metadata.yaml
# Actualizado per TREQ_043 (target_version field) y uso consistente
# observado en TQ_015, TQ_016, TQ_017.

tquery:
  id: "TQ_NNN"
  trigger_type: "KNOWLEDGE_GAP|SCOPE_DRIFT|ARCHITECTURAL_DECISION_REQUIRED"
  originating_agent: ""
  active_branch: ""
  target_version: null  # OPCIONAL — TREQ_043. Si null, defaults a la
                          # versión actual del proyecto. Si se especifica
                          # (ej "v2.0.0"), Plane 4 del GIR clasifica esta
                          # TQUERY como GREEN/correctamente-diferida en
                          # lugar de RED al auditar una versión anterior.

  context_bounds:
    file_in_focus: ""
    problem_statement: ""

  resolution_owner:
    agent_layer: ""  # ej "PM Orchestrator", "System Architect"
    hitl_role: null
    hitl_signatory: null
    fallback: "HITL"

  actionable_options:
    option_alpha: ""
    option_beta: ""
    option_custom: ""

  hitl_decision:
    selected_option: null
    provided_input: null
    timestamp: null
    signatory_fingerprint: null
    resolution_artifact: null  # ID del artefacto que resuelve la TQUERY
